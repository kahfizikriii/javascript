<!DOCTYPE html>
<html>
<head>
  <title>Contoh DOM</title>
</head>
<body>\
    <!--6.-->
  <h1 id="judul">Teks Lama</h1>
    <!--9.-->
  <p>Paragraf 1</p>
  <p>Paragraf 2</p>
  <p>Paragraf 3</p>
   <!--17.-->
    <img id="banner" src="awal.jpg" alt="Banner Awal">
   <!--23.-->
  <div class="card">Card lama 1</div>
  <div class="card">Card lama 2</div>
  <div class="card">Card lama 3</div>
  <div class="card">Card lama 4</div>
  <!--24.-->
  <ul id="daftarSurat"></ul>
  <!--25.-->
  <p id="hasil"></p>  

  <script>
    //6.
    const judul = document.getElementById("judul");
    judul.innerText = "Belajar DOM Selection";
    //9.
     const paragraf = document.querySelectorAll("p");
    paragraf.forEach(p => {
      p.style.color = "blue";
    });
    //17.
    const banner = document.getElementById("banner");
    banner.src = "banner.jpg";
    banner.style.width = "300px";
    //23.
    const cards = document.querySelectorAll(".card");
        const color = ["red", "green", "blue"];
        cards.forEach((card, i) => {
            card.style.border = `${i + 1}px solid black`;
            card.style.background = color[i];
            card.innerHTML = `Card ${i + 1}`;
        })
   //24.
    async function getSurat() {
      try {
        const response = await fetch("https://equran.id/api/v2/surat");
        const result = await response.json();
        const dataSurat = result.data;
        const daftar = document.getElementById("daftarSurat");
        dataSurat.forEach(surat => {
          daftar.innerHTML += `<li>${surat.namaLatin} (${surat.nama})</li>`;
        });

      } catch (error) {
        console.error("Terjadi error:", error);
      }
    }
    getSurat();
    //25.
        async function hitungTodoSelesai() {
      try {

        const res = await fetch("https://jsonplaceholder.typicode.com/todos");
        const data = await res.json();
        const total = data.filter(todo => todo.completed).length;
        document.getElementById("hasil").textContent =
          "Jumlah todo yang completed: " + total;
      } catch (err) {
        document.getElementById("hasil").textContent =
          "Terjadi error: " + err.message;
      }
    }
    hitungTodoSelesai();
  
  </script>
</body>
</html>
